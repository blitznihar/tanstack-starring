# Local deployment: MongoDB + Comet API/UI in Docker Desktop.
# Later: point MONGODB_URI at MongoDB Atlas — no code changes (repository layer).
services:
  mongo:
    image: mongo:7
    profiles: ["local-mongo"]
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - comet-mongo:/data/db

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5174:3000"
    environment:
      # Uses Atlas when MONGODB_URI is set in .env; falls back to the local Mongo container.
      # The app selects database "comet-dev" locally and "comet" only in Vercel production.
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/comet-dev}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      AI_ENABLED: ${AI_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-5.4-mini}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-60000}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-}
      AUTH0_CALLBACK_URL: ${AUTH0_CALLBACK_URL:-http://localhost:3000/callback}
      AUTH0_LOGOUT_URL: ${AUTH0_LOGOUT_URL:-http://localhost:3000/logout}
      AUTH0_CONNECTION: ${AUTH0_CONNECTION:-}
      WEEKLY_ROBUX_BUDGET: ${WEEKLY_ROBUX_BUDGET:-1000}
      EXAM_ROBUX_SHARE: ${EXAM_ROBUX_SHARE:-0.5}
      EXAM_WRONG_PENALTY: ${EXAM_WRONG_PENALTY:-10}
      EXAM_AWARD_FLOOR: ${EXAM_AWARD_FLOOR:-0}
      EMAIL_FROM: ${EMAIL_FROM:-Comet Academy <no-reply@example.com>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_...}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_...}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_...}

volumes:
  comet-mongo:
