name: CI/CD

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  VERCEL_ARTIFACT_NAME: vercel-prebuilt-${{ github.sha }}

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NITRO_PRESET: vercel
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          bun install --frozen-lockfile || {
            echo "bun install failed; clearing Bun package cache and retrying once..." >&2
            bun pm cache rm
            rm -rf node_modules
            bun install --frozen-lockfile
          }

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test with coverage
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview --scope="$VERCEL_ORG_ID" --token="$VERCEL_TOKEN"

      - name: Build immutable Vercel artifact
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --target=preview --scope="$VERCEL_ORG_ID" --token="$VERCEL_TOKEN"

      - name: Remove local Vercel environment files
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: find .vercel -maxdepth 1 -name ".env*.local" -type f -delete

      - name: Verify Vercel function configs
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: test -f .vercel/output/functions/__server.func/.vc-config.json

      - name: Upload immutable Vercel artifact
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.VERCEL_ARTIFACT_NAME }}
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
          path: |
            .vercel/output
            .vercel/project.json
            vercel.json

  deploy-preview:
    name: Vercel Preview
    runs-on: ubuntu-latest
    needs: ci
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref_name == github.event.repository.default_branch)
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.deployment_url }}
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Download immutable Vercel artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.VERCEL_ARTIFACT_NAME }}
          path: .

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy Vercel preview artifact
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TELEMETRY_DISABLED: 1
        run: |
          vercel deploy --prebuilt --archive=tgz --scope="$VERCEL_ORG_ID" --token="$VERCEL_TOKEN" > deployment-url.txt
          deployment_url="$(tail -n 1 deployment-url.txt)"
          if ! echo "$deployment_url" | grep -Eq '^https://'; then
            echo "Expected Vercel deployment URL, got: $deployment_url" >&2
            exit 1
          fi
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Preview deployment: $deployment_url"

  deploy-production:
    name: Vercel Production
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref_name == github.event.repository.default_branch
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment_url }}
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Promote approved preview deployment to Vercel production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TELEMETRY_DISABLED: 1
          PREVIEW_DEPLOYMENT_URL: ${{ needs.deploy-preview.outputs.deployment_url }}
        run: |
          if [ -z "$PREVIEW_DEPLOYMENT_URL" ]; then
            echo "Missing preview deployment URL from deploy-preview job." >&2
            exit 1
          fi

          set -o pipefail
          vercel promote "$PREVIEW_DEPLOYMENT_URL" --yes --scope="$VERCEL_ORG_ID" --token="$VERCEL_TOKEN" 2>&1 | tee promote-output.txt
          deployment_url="$(grep -Eo 'https://[^[:space:]]+' promote-output.txt | grep -Ev 'vercel.com/docs|vercel.link' | tail -n 1 || true)"
          deployment_url="${deployment_url:-$PREVIEW_DEPLOYMENT_URL}"
          if ! echo "$deployment_url" | grep -Eq '^https://'; then
            echo "Expected Vercel promoted deployment URL, got: $deployment_url" >&2
            exit 1
          fi
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Production deployment: $deployment_url"

  create-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: deploy-production
    if: success()
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      PRODUCTION_DEPLOYMENT_URL: ${{ needs.deploy-production.outputs.deployment_url }}
    steps:
      - name: Create unique release tag
        id: tag
        run: |
          date_part="$(date -u +%Y%m%d)"
          base_tag="golden${date_part}-${GITHUB_RUN_NUMBER}"
          tag="$base_tag"

          tag_exists() {
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/$1" >/dev/null 2>&1
          }

          if tag_exists "$tag"; then
            tag="${base_tag}-${GITHUB_RUN_ATTEMPT}"
          fi

          if tag_exists "$tag"; then
            tag="${base_tag}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA::7}"
          fi

          if tag_exists "$tag"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag already exists after fallback attempts: $tag"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        if: steps.tag.outputs.skip != 'true'
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          cat > release-notes.md <<EOF
          Production deployment ${RELEASE_TAG}

          - Commit SHA: ${GITHUB_SHA}
          - Branch: ${GITHUB_REF_NAME}
          - Workflow run: ${GITHUB_RUN_NUMBER}
          - Production URL: ${PRODUCTION_DEPLOYMENT_URL}
          EOF

      - name: Create GitHub release
        if: steps.tag.outputs.skip != 'true'
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Golden deployment ${RELEASE_TAG}" \
            --notes-file release-notes.md
