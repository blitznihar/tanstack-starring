name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  VERCEL_ARTIFACT_NAME: vercel-prebuilt-${{ github.sha }}

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NITRO_PRESET: vercel
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test with coverage
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link Vercel project metadata
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

      - name: Build immutable Vercel artifact
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Remove local Vercel environment files
        run: find .vercel -maxdepth 1 -name ".env*.local" -type f -delete

      - name: Upload immutable Vercel artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.VERCEL_ARTIFACT_NAME }}
          if-no-files-found: error
          retention-days: 14
          path: |
            .vercel/output
            .vercel/project.json
            vercel.json

  deploy-preview:
    name: Vercel Preview
    runs-on: ubuntu-latest
    needs: ci
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main')
    environment: preview
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Download immutable Vercel artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.VERCEL_ARTIFACT_NAME }}
          path: .

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy Vercel preview artifact
        run: vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}

  deploy-production:
    name: Vercel Production
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Download immutable Vercel artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.VERCEL_ARTIFACT_NAME }}
          path: .

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy Vercel production artifact
        run: vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
