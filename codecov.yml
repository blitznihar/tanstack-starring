coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 20%
        threshold: 5%
        if_ci_failed: error
    patch:
      default:
        target: 50%
        threshold: 10%
        informational: true

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false

ignore:
  - "src/routeTree.gen.ts"
  - "src/vite-env.d.ts"
  - "dist/**"
  - ".output/**"
  - "coverage/**"
  - "content/**"
  - "electron/**"
  - "scripts/**"
